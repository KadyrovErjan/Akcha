<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация — AkchaAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />
</head>
<body class="auth-body">
<div class="noise"></div>

<div class="auth-split">
  <div class="auth-hero">
    <div class="hero-bg-grid"></div>
    <div class="hero-orb hero-orb-1"></div>
    <div class="hero-orb hero-orb-2"></div>
    <div class="hero-content">
      <div class="hero-logo">
        <span class="logo-icon large">₸</span>
        <span class="logo-text large">Akcha<em>AI</em></span>
      </div>
      <p class="hero-tagline">Начни контролировать<br/>свои финансы сегодня.</p>
    </div>
  </div>

  <div class="auth-form-wrap">
    <div class="auth-card">
      <h1 class="auth-title">Создать аккаунт</h1>
      <p class="auth-sub">Заполните данные ниже</p>

      <form method="post" class="auth-form">
        {% csrf_token %}
        <div class="field-group">
          <label class="field-label">Имя пользователя</label>
          <input type="text" name="username" class="field-input" placeholder="username" required />
          {% if form.username.errors %}<span class="field-error">{{ form.username.errors.0 }}</span>{% endif %}
        </div>
        <div class="field-group">
          <label class="field-label">Email</label>
          <input type="email" name="email" class="field-input" placeholder="email@example.com" />
        </div>
        <div class="field-group">
          <label class="field-label">Ежемесячный доход (сом)</label>
          <input type="number" name="income" class="field-input" placeholder="0" min="0" step="0.01" />
        </div>
        <div class="field-group">
          <label class="field-label">Пароль</label>
          <input type="password" name="password" class="field-input" placeholder="••••••••" required />
          {% if form.password.errors %}<span class="field-error">{{ form.password.errors.0 }}</span>{% endif %}
        </div>
        <div class="field-group">
          <label class="field-label">Повторите пароль</label>
          <input type="password" name="password2" class="field-input" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary full">Создать аккаунт →</button>
      </form>

      <p class="auth-switch">Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
    </div>
  </div>
</div>
</body>
</html>
